syntax = "proto3";

package lifescience.sensors.registry.management;

import "google/rpc/status.proto";
import "verily/ds_sdk/protos/ble.proto";

// A registry is a grouping of devices that are associated with a common ACL.
// When a device is created it must be created within an existing registry.
// Registries can be arbitrarily created by clients. In practice, the concept of
// Registry aligns with a set of devices intended to be used by a large study
// (e.g. Baseline).
message Registry {
  // The resource name of this Registry in the format
  // "registries/<Registry GUID>".
  // E.g. "registries/e3bc11dc-1a06-06d7-5bab-ffd8e884fe59".
  string name = 1;
  // Display-friendly name of this Registry.
  string display_name = 2;
  // Output only. In milliseconds since UNIX epoch.
  int64 creation_time = 3;
  // Output only. In milliseconds since UNIX epoch.
  int64 update_time = 4;
  // Policy to control custom behavior for this Registry.
  RegistryPolicy policy = 5;
  // The resource name of the study that this registry is associated with.
  string study_id = 6;
}

// RegistryPolicy allows registries to enforce certain behaviors e.g. all
// participants must be in FOO namespace.
message RegistryPolicy {
  // If set, all participants created/updated in this registry must belong to
  // this namespace.
  Participant.ParticipantNamespace required_participant_namespace = 1;
  // When required_participant_namespace is ANON_STUDY_DEVICE, this prefix must
  // be non-empty, and all subsequent participant creation and updates will
  // verify that the participant id contains this prefix.
  string legacy_anonymous_study_prefix = 2;
  // Whitelist of DeviceSpecs required by this Registry. Devices created without
  // a whitelisted DeviceSpec will be rejected. If the list is empty, then no
  // DeviceSpec is required and any DeviceSpec can be used. Field values are
  // DeviceSpec names. E.g. "deviceSpecs/com.verily.study_watch".
  repeated string device_specs = 3;
  // The description of how SensorStore publishes to the Cloud Pub/Sub Service
  // for notifications about when a device in this registry uploads data.
  repeated TopicConfig topic_configs = 4;
  // The Firebase project ID that is used for all the participant with FIREBASE
  // namespace in this Registry.
  string firebase_project_id = 5;
  // Whether to enable ParticipantService, which allows participants to
  // create/delete their claimed devices. `device_specs` must not be empty if
  // this is set to true.
  bool enable_participant_service = 6;
  // Principals that are allowed authorities for the authorization of device
  // requests in the registry.
  repeated DeviceAuthority allowed_authorities = 7;
  // Mapping of device specs to default device configurations.
  map<string, DeviceConfig> device_spec_default_device_configs = 8;
  // Determines where sensor data for this registry is stored. This governs both
  // the location of the Spanner servers which hold a consistent storage of
  // data, as well the location for the BigQuery dataset, if BigQuery exports
  // are enabled. The intermediate GCS bucket location must also be compatible
  // with this location. See https://cloud.google.com/bigquery/docs/locations.
  DataStorageLocation data_storage_location = 11;
  // Configuration for exporting SensorStore device data to BigQuery, with
  // writing Avro files to GCS as an intermediary.
  repeated DataExportConfig data_export_configs = 9;
  // Whether the SensorStore delegation of this Registry only takes place in the
  // flattened Spanner schema, see go/sensorsuite-delegation-4d. Deprecated.
  bool delegation_4d_only = 10 [deprecated = true];
  // The authorization backends to use.
  repeated AuthorizationDelegate authorization_delegates = 12;
}

// The description of how SensorStore publishes to the Cloud Pub/Sub Service
// for notifications about when a device uploads data. TopicConfigs are
// configured in a Registry's RegistryPolicy.
message TopicConfig {
  // The name of topic. e.g. "projects/myproject/topics/mytopic".
  string name = 1;
  // List of DataSpecs IDs to publish on this topic. DataSpecs are defined in
  // SensorStore.
  repeated string data_specs = 2;
}

// A Configuration represents the configuration of a device as intended by the
// service. Configuration flows one-way from cloud to device. A configuration's
// format is unknown to the Sensor Registry and is stored as an opaque binary.
// Note that the configuration of a device may differ from device to device even
// within the same Registry.
//
// LINT.IfChange(device_config)
message DeviceConfig {
  // The resource name of this configuration. E.g.
  // `"registries/xyz/devices/abc/configurations/3"`.
  string name = 1;
  // Integer version of the configuration. This value is generated by the server
  // and is monotonically increasing.
  int32 version = 2;
  // Output only. In milliseconds since UNIX epoch.
  int64 create_time = 3;
  // Output only. The time at which the device first acknowledged the
  // application of the DeviceConfig. In milliseconds since UNIX epoch.
  int64 ack_time = 4;
  // Blackbox data set by client. In practice, this field is set to a serialized
  // protobuf controlled by client.
  bytes data = 5;
  // Firmware version that the device should be configured to.
  string firmware_version = 6;
  // Firmware url that the device should be configured to. In practice, this
  // should be updated at the same time firmware_version is updated.
  string firmware_url = 7;

  // Host device connection information.
  message DeviceHostConfig {
    // Defines the information necessary for creating a secure BLE connection
    // to BLE peripherals (e.g. EarlySense).
    message BleConnection {
      // The cross-registry unique identifier of this device. Same as
      // `Device.global_id`.
      string device_id = 1;
      // Required. MAC address of the BLE device.
      string mac_address = 2;
      // Optional. Passkey for pairing with the BLE device; an integer between
      // 0-999999 per `chrome.bluetoothPrivate` API.
      // See:
      // http://cs.chromium.org/chromium/src/extensions/common/api/bluetooth_private.idl
      uint32 passkey = 3;
      // The BLE device configuration of the peripheral. This field is
      // used by hosts to connect to implementation-agnostic BLE peripherals.
      // Hosts can use the information in the peripheral's configuration to
      // connect and parse data coming from the peripheral.
      lifescience.ble.BlePeripheralDeviceConfig config = 4;
    }

    // List of all BLE connections supported by this host device.
    repeated BleConnection ble_connections = 1;
  }
  // Defines connections supported by this host device. This field is only
  // present for devices that are marked as device hosts. The field is
  // read-only.
  DeviceHostConfig host_config = 8;
  // The status of the device applying this configuration. Status = OK is
  // assumed if this field is not specified.
  google.rpc.Status config_status = 9;

  // Optional. Defines the resource id in the DeviceConfigSpecService this
  // device configuration originated.
  string source_device_config_spec = 10;

  // Blackbox data set by the DeviceGroup. This field is usually set to a
  // serialized protobuf controlled by the client. The merging of `group_data`
  // field and `data` field is controlled by other services.
  bytes group_data = 11;
}

// An entity or principal that is the source of a device request.
message DeviceAuthority {
  // Info about a specific type of device authority.
  oneof authority {
    // Info about a GAIA device authority.
    GaiaAuthority gaia = 1;
    // Info about a legacy Rialto app device authority.
    LegacyRialtoAppAuthority legacy = 2;
    // Info about an asymmetric key holder device authority.
    AsymKeyHolderAuthority asym_key_holder = 3;
    // Info about an obfuscated GAIA device authority.
    ObfuscatedGaiaAuthority obfuscated_gaia = 4;
    // Info about an asymmetric key holder peripheral device authority.
    AsymKeyHolderAuthority delegated_asym_key_holder = 5;
    // Info about a current participant authority.
    CurrentParticipantAuthority current_participant = 6;
  }
}

// The authority of a GAIA user/service account. Authentication is performed
// with OAuth2 or GaiaMint.
message GaiaAuthority {
  // A GAIA user is identified by its email address. This is mutually
  // exclusive with `id`, so exactly one can be provided.
  string email = 1;
  // A GAIA user is also identified by its numeric GAIA ID. This is mutually
  // exclusive with `email`, so exactly one can be provided.
  int64 id = 2;
}

// The authority of a GAIA user/service account. Authentication is performed
// with OAuth2. The GAIA ID is obfuscated on the client.
message ObfuscatedGaiaAuthority {
  // A GAIA user is identified by its obfuscated GAIA ID.
  string id = 1;
}

// The authority of a Rialto application. Authentication is performed by
// comparing the Google Cloud Project API key provided in the request with the
// one stored in keystore. This authority should be limited to Coppa devices.
message LegacyRialtoAppAuthority {
  // No fields.
}

// The authority of something that holds the private key. Authentication is
// performed with JWTs.
message AsymKeyHolderAuthority {
  // Public key used to verify the signature of the JWT.
  string public_key = 1;
}

// The authority of the current participant who claims the device. Authorization
// is performed by checking the provided end user credential.
message CurrentParticipantAuthority {
  // No fields.
}

// The location where data will be stored.
enum DataStorageLocation {
  // Reserved.
  DATA_STORAGE_LOCATION_UNSPECIFIED = 0;
  // Sensor data is stored in US-only Spanner allocs and exports in the 'US' GCP
  // location, see: https://cloud.google.com/bigquery/docs/locations.
  DATA_STORAGE_LOCATION_US = 1;
  // Sensor data is stored in EU-only Spanner allocs and exports in the EU GCP
  // location.
  DATA_STORAGE_LOCATION_EU = 2;
}

// Configuration for exporting sensor data.
message DataExportConfig {
  reserved 1, 2, 3, 4;
  // Configuration for exporting sensor data to BigQuery.
  message BigQueryExportConfig {
    reserved 3, 4;
    // Enumeration of the locations of Echo BigQuery.
    enum EchoFormat {
      // Export to both Legacy & Internal Echo tables.
      ALL_FORMATS = 0;
      // Only export to Legacy Echo tables.
      LEGACY_ONLY = 1;
      // Only export to Internal Echo tables.
      INTERNAL_ONLY = 2;
    }

    // Whether to stream data into Echo or not (go/streaming-echo).
    enum ExportMode {
      // Write data to Avro files in GCS.
      DEFAULT_GCS_ONLY = 0;
      // Write files to Avro files in GCS and also stream to BQ. If this mode is
      // enabled, the pubsub messages will use a dataset where it either
      // replaces 'sensor_store' with 'pubsub' or prefixes the dataset with
      // 'pubsub_' if it doesn't contain 'sensor_store'
      BOTH = 1;
      // Publish Avro contents to PubSub (go/streaming-echo)
      PUBSUB_ONLY = 2;
    }

    // Name of the GCP project that is for data export. This may be owned by
    // the SensorSuite team, or the client, depending on the case.
    // `verily-sensors-batch-jobs@system.gserviceaccount.com` needs
    // roles/bigquery.admin on the project.
    string google_cloud_project_id = 1;
    // Name of the GCS bucket to upload temporary Avro files to while loading.
    // The location of this bucket must match `google_cloud_data_location`. The
    // following service accounts should be granted these Storage IAM roles (see
    // https://cloud.google.com/storage/docs/access-control/iam-roles):
    // `lifescience-sensors-store@system.gserviceaccount.com` needs
    // roles/storage.admin.
    // `verily-sensors-batch-jobs@system.gserviceaccount.com` needs
    // roles.storage.objectAdmin.
    string google_cloud_bucket_name = 2;
    // Dataset name to upload tables to. Must be a valid Dataset name,
    // no spaces etc.
    // lifescience-sensors-store@system.gserviceaccount.com needs
    // roles/bigquery.metadataViewer on the DataSet.
    string dataset_name = 5;
    // The BigQuery Dataset location for this data
    string dataset_location = 6;
    // Specifies if data should be exported as legacy Echo, internal Echo, or
    // both.
    EchoFormat echo_format = 7;
    // Specifies if data should be streamed to echo, written to Avro files, or
    // both.
    ExportMode export_mode = 8;
  }

  // The type of data export to perform.
  oneof data_export_type {
    // BigQuery data export.
    BigQueryExportConfig big_query_export_config = 5;
  }
}

// An authorization backend to use for a Registry.
message AuthorizationDelegate {
  // Namespaces of the participants whose authorization should be delegated to
  // this backend.
  repeated Participant.ParticipantNamespace participant_namespaces = 1;
  // The authorization backend server spec.
  oneof backend_spec {
    // Specification of a Borg-internal backend.
    InternalAuthorizationDelegate internal = 2;
  }
}

// A Borg-internal server to use as an authorization delegate.
message InternalAuthorizationDelegate {
  // Enumeration of the interfaces for authorization. Each corresponds to a code
  // hook.
  enum InterfaceType {
    // Reserved.
    UNKNOWN = 0;
    // CSP authorization backend.
    CSP = 1;
    // DMI authorization backend.
    DMI = 2;
  }

  // Type of the authorization interface. Corresponds to a code hook.
  InterfaceType interface_type = 1;
  // ID of the dynamic stub to use. This ID maps to a Boq Dynamic Stubs
  // configuration which SensorSuite backends are configured to use.
  string dynamic_stubs_id = 2;
}

// A subject or patient who uses a device.
message Participant {
  // Type of participant.
  enum ParticipantNamespace {
    // Reserved.
    UNKNOWN = 0;
    // GAIA user identified by a id of the decimal representation of the user's
    // GAIA ID. Supports self-auth.
    GAIA = 1;
    // MPower namespace.
    MPOWER = 2;
    // Hashed string namespace.
    HASHED_STRING = 3;
    // CSP namespace. Supports self-auth.
    // TODO(b/180118973): In SensorRegistry, this is always the internal CSP
    // ID.
    CSP = 4;
    // Anonymous study device namespace. Used when synthetic participants are
    // needed.
    ANON_STUDY_DEVICE = 5;
    // Custom id space for the registry. Will be prefixed by the registry ID and
    // a colon (":"). For example if the Registry ID is "1-xxx-xxx" then the
    // `id` should start with "1-xxx-xxx:".
    SENSOR_REGISTRY_CUSTOM = 6;
    // An obfuscated GAIA ID. For now, this is used only to support conversion
    // from obfuscated GAIA IDs on clients registering devices to unobfuscated
    // GAIA IDs in sensor registry.
    OBFUSCATED_GAIA = 7;
    // Users in the DMI system. Uses Userid.user_string. Caller must be
    // authenticated with the DMI system. Supports self-auth.
    DMI = 8;
    // Chinese version of CSP namespace.
    CSP_UUID = 9;
    // Firebase accounts. The `id` field is the Firebase account user ID. The
    // Firebase project ID is indicated in the `firebase_project_id` field of
    // RegistryPolicy. Supports self-auth.
    FIREBASE = 10;
  }

  // Type of the participant.
  ParticipantNamespace participant_namespace = 1;
  // Identifier of the participant within its namespace.
  string id = 2;
  // Whether data should be collected from the associated device. Deprecated.
  bool collect_data = 3 [deprecated = true];
}
