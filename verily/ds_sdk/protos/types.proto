syntax = "proto3";

package google.lifescience.sensorstore;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "verily/ds_sdk/protos/enums.proto";
import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";

// Message to define an arbitrary time span. This should be interpreted as a
// closed-open range.
message TimeInterval {
  // Start time of this interval, inclusive.
  google.protobuf.Timestamp start = 1;
  // End time of this interval, exclusive.
  google.protobuf.Timestamp end = 2;
}

// Represents a separate collection application or project within Life Sciences.
message Application {
  // Unique identifier for the application.
  ApplicationId id = 1;
  // Free-form version of the application. E.g. "v1" "1.0.4".
  string version = 2;
}

// Android Phone Specific info.
message AndroidMetadata {
  // Device brand, e.g. "Google", "Samsung", etc.
  string brand = 1;
  // Deprecated, use `Device.manufacturer` instead.
  string manufacturer = 2 [deprecated = true];
  // Ex: "Nexus 5x". Deprecated, use `Device.model` instead.
  string model = 3 [deprecated = true];
  // Ex: "7.1.1". Deprecated, use `Device.os_version` instead.
  string os_version = 4 [deprecated = true];
}

// (-- api-linter: core::0123::resource-annotation=disabled
//     aip.dev/not-precedent: This is not a resource --)
// Metadata about a device.
message Device {
  // Serial number or the device. This is a unique device identifier and must
  // be present for writes. For reads at least one of serial_number and name
  // must be present.
  string serial_number = 2;
  // This field has been deprecated. It's original intended use was to
  // group devices with a single name instead of having to know the serial
  // number of each device. In practice, grouping is achieved by reading a
  // certain type of data and leaving the device serial number unspecified
  // (wildcard).
  string name = 1 [deprecated = true];
  // Version of the device's hardware. Not applicable for read requests.
  string hardware_version = 3;
  // Version of the device's firmware. Not applicable for read requests.
  string firmware_version = 4;
  // Version of the device's software, if any. Not applicable for read
  // requests.
  string software_version = 7;
  // Timezone Name/ID of the device, for eg: "America/Los_Angeles".
  string time_zone_name = 6;
  // Manufacturer of the device. Not applicable for read requests.
  string manufacturer = 8;
  // Model number of the device. Not applicable for read requests.
  string model = 9;
  // Operating system version of the device. Not applicable for read requests.
  string os_version = 10;
  // Id associated with the session the data being uploaded under.
  // (eg. Virtual Serial Number)
  string data_session_id = 11;
  // Device Specific Info. More device spec can be added later.
  oneof device_metadata {
    AndroidMetadata android_metadata = 5;
  }
  // (-- api-linter: core::0142::time-field-type=disabled
  //     aip.dev/not-precedent: This is not a timestamp. --)
  // Whether the DST is enabled.
  DaylightSavingTime daylight_saving_time = 12;
}

// Description of the unit a value is in.
// Will be evaluated as: scaleFactor * (scale * unit) ^ power
message Unit {
  // Type of unit.
  UnitType type = 1;
  // Scaling factor of unit.
  UnitScale scale = 2;
  // Power scale of unit. To make a Hertz unit, power would be -1 and type
  // would be SECOND.
  int32 power = 3;
  // Some units are non-unit factors of SI units. This can be set here.
  double scale_factor = 4;
}

// Description of a type of data field.
message DataFieldSpec {
  // Name of this field.
  string name = 1;
  // Units for this field. Units are repeated to allow construction of
  // composite units types. The final unit will be the product of all Unit
  // values.
  //
  // For example, a typical IMU chip would produce integer count values for
  // acceleration. The values are mapped to some number of Gs. 1 G per 2000
  // ints could be expressed like:
  // unit { type: COUNT scale: UNIT power: -1 scale_factor: 2000}
  // unit { type: ACCELERATION scale: UNIT power: 1 scale_factor: 9.8}
  //
  // Or:
  // unit { type: ACCELERATION scale: UNIT power: 1 scale_factor: 0.0049}
  //
  // Or:
  // unit { type: COUNT scale: UNIT power: 1 scale_factor: 0.0049}
  // unit { type: METER scale: UNIT power: 1 scale_factor: 1}
  // unit { type: SECOND scale: UNIT power: -2 scale_factor: 1}
  //
  // Or even:
  // unit { type: COUNT scale: UNIT power: 1 scale_factor: 0.0049}
  // unit { type: METER scale: UNIT power: 1 scale_factor: 1}
  // unit { type: SECOND scale: UNIT power: -1 scale_factor: 1}
  // unit { type: SECOND scale: UNIT power: -1 scale_factor: 1}
  repeated Unit units = 2;
  // What type of data is stored for this field. This corresponds to which
  // proto field within a Value.data oneof will be set.
  PrimitiveType primitive = 3;
  // Whether this field must be present in a DataPoint for it to be valid.
  bool is_optional = 4;
  // Only valid if primitive is STRING or STRING_LIST. Can be used to
  // approximate an enum.  If not empty, DataPoint values must be one of these.
  repeated string accepted_string_values = 5;
}

// Description of a type of data.
message DataSpec {
  option (google.api.resource) = {
    type: "lifesciencesensorstore.googleapis.com/DataSpec"
    pattern: "{data_spec}"
  };

  // Name of a data type. This will be used to match to DataPoints by
  // DataPoint.data_type_name. Can not be empty. A specific format for data
  // type naming is not (currently) enforced, but it recommended to roughly
  // follow java package naming conventions:
  // - Use reversed domain name to begin. For example, com.verily.pulse_rate
  // - All lower case to avoid conflicts.
  string name = 1;
  // Fields that can be included in DataSets of this spec.
  repeated DataFieldSpec field_specs = 2;
  // Canonical DataSpec that is linked to this DataSpec. For example,
  // 'com.verily.ppg'. When data is read from the canonical DataSpec, data from
  // this DataSpec (ex. 'com.verily.ppg'), then data from this DataSpec (ex.
  // com.verily.studywatch.ppg') will also be read. This field will be ignored
  // when writing data. Data will only be written to the DataSpec specified by
  // name, above.
  // TODO(b/156659863): Yet to implement.
  string canonical_data_spec = 3 [(google.api.resource_reference) = {
    type: "lifesciencesensorstore.googleapis.com/DataSpec"
  }];
}

// Description of a source of data. Includes where it came from and what format
// it is in.
message DataSource {
  option (google.api.resource) = {
    type: "lifesciencesensorstore.googleapis.com/DataSource"
    pattern: "{data_source}"
  };

  // Name of the data source.
  string name = 1;
  // Application the data belongs to. Required for write requests. If
  // unspecified on a read request, STUDY_KIT wil be used by default.
  // This should be reserved for rare cases where data needs to be siloed by
  // application.
  Application application = 2;
  // Device that generated the data.
  Device device = 3;
  // Description of the data.
  DataSpec data_spec = 4;
  // Sensor that generated the data. Useful for disambiguating multiple sensors
  // on the same device and outputting the same data_spec.
  Sensor sensor = 5;
  // Metadata related to the algorithm that generated the data.
  Algorithm algorithm = 6;
  // The name of the registry associated with the data. Must follow the format:
  // "registries/<Registry UUID>" where NAMESPACE, e.g.
  // "registries/e3bc11dc-1a06-06d7-5bab-ffd8e884fe59".
  string registry = 7;
}

// Description of the sensor that took the measurement.
message Sensor {
  // ID of the sensor. Examples: numeric ID, body location, etc.
  string id = 1;
}

// A general versioning message used to indicate different methodologies or
// algorithms for various metrics.
message Algorithm {
  // Name of algorithm.
  string name = 1;
  // Version of algorithm.
  string version = 2;
}

// List of int64 values
message Int64List {
  // The int64 values
  repeated int64 values = 1 [packed = true];
}

// List of float values
message Float64List {
  // The float values
  repeated double values = 1;
}

// List of string values
message StringList {
  // The string values
  repeated string values = 1;
}

// List of boolean values
message BooleanList {
  // The boolean values
  repeated bool values = 1;
}

// List of blobs.
message BlobList {
  // The blob values.
  repeated bytes values = 1;
}

// A single field within a DataPoint. The value itself can have one of several
// different types.
message Value {
  reserved 11;
  // This should match of the field name of the DataFieldSpec for this value in
  // the DataSet's DataSource's DataType.
  string field_name = 1;
  // This oneof must be kept in sync with the PrimitiveType enum.
  oneof data {
    // Value as a int64.
    int64 int64_value = 2;
    // Value as a list of int64s.
    Int64List int64_list = 3;
    // Value as a float64.
    double float64_value = 4;
    // Value as a list of float64s.
    Float64List float64_list = 5;
    // Value as a string.
    string string_value = 6;
    // Value as a list of string.
    StringList string_list = 7;
    // Blob is intended for passing binary data (images, audio, etc.) as a field
    // within a DataPoint. Metadata about the blob (encoding, sampling rate,
    // encryption key name, etc) should be stored as separate fields. If no
    // validation of the composite data format is needed, the Any below could be
    // used instead.
    bytes blob = 8;
    // While an arbitrary proto message with several fields can be stored as a
    // single Value here, it is normally encouraged that you break your
    // application specific message's fields into separate Values within the
    // DataPoint (and separate DataFieldSpecs within the DataSpec). Each of
    // those Values should ideally use one of the above fields. This allows the
    // DataSet to still be self describing and SensorStore to validate/convert
    // units as appropriate for passing data to delegates.
    google.protobuf.Any any = 9;
    // Value as a boolean.
    bool boolean_value = 10;
    // Value as a list of boolean.
    BooleanList boolean_list = 13;
    // Value as a list of blobs.
    BlobList blob_list = 12;
  }
}

// A single field within a AggregatedDataPoint. The value itself can have one of
// several different types.
message AggregatedValue {
  // The DataFieldSpec.name that this aggregation is computed over.
  string field_name = 1;
  // The number of entries in the aggregation bucket.
  int64 count = 2;
  // The sum of the all the data in the aggregation bucket.
  double sum = 3;
  // The average (sum/count) of all the data in the aggregation bucket. If
  // count is 0, the mean will be zero.
  double mean = 4;
  // The variance (E(x^2) - E(x)^2) of the data in the aggregation bucket. If
  // count is 0, the mean will be zero.
  double variance = 5;
}

// A key and time to mark the points as written for a batch.
message OverwriteToken {
  // A key that identifies this batch of points (scoped to the
  // User/Device/DataSpec).
  string overwrite_key = 1;
  // A generic version field that indicates staleness of DataPoints used to
  // generate derived data. This field is optional and is ignored if not set.
  // Will usually correspond to a timestamp in millis since epoch.
  int64 source_data_version = 2 [(google.api.field_behavior) = OPTIONAL];
}
